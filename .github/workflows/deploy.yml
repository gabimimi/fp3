# Full map + transit isochrones need these repository secrets (Settings → Secrets and variables → Actions):
#   OPENROUTE_KEY          — OpenRoute API key (or use VITE_OPENROUTE_KEY instead)
#   TRAVELTIME_APP_ID      — TravelTime app id for public_transport isochrones (or VITE_TRAVELTIME_APP_ID)
#   TRAVELTIME_API_KEY     — TravelTime API key (or VITE_TRAVELTIME_API_KEY)
# GITHUB_REPOSITORY is set automatically so Vite can use the correct /repo/ base path.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENROUTE_KEY: ${{ secrets.OPENROUTE_KEY }}
          VITE_OPENROUTE_KEY: ${{ secrets.VITE_OPENROUTE_KEY }}
          TRAVELTIME_APP_ID: ${{ secrets.TRAVELTIME_APP_ID }}
          VITE_TRAVELTIME_APP_ID: ${{ secrets.VITE_TRAVELTIME_APP_ID }}
          TRAVELTIME_API_KEY: ${{ secrets.TRAVELTIME_API_KEY }}
          VITE_TRAVELTIME_API_KEY: ${{ secrets.VITE_TRAVELTIME_API_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
